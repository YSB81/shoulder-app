  parks:{label:"National Parks",color:"#166534",icon:"🌲"},
  city:{label:"Cities",color:"#6d28d9",icon:"🏙️"},
  mountain:{label:"Mountain",color:"#c2410c",icon:"⛰️"},
  unique:{label:"Unique",color:"#a21caf",icon:"✨"},
};

const PRESETS = {
  balanced:{price:30,weather:25,crowds:25,access:20,label:"Balanced",desc:"Equal priority"},
  budget:{price:50,weather:15,crowds:20,access:15,label:"Budget",desc:"Maximize savings"},
  experience:{price:15,weather:30,crowds:30,access:25,label:"Experience",desc:"Best conditions"},
  adventurer:{price:20,weather:35,crowds:15,access:30,label:"Explorer",desc:"Weather + access"},
};

const getComp = (sc,m,w) => {const t=w.price+w.weather+w.crowds+w.access;return sc.price[m]*(w.price/t)+sc.weather[m]*(w.weather/t)+sc.crowds[m]*(w.crowds/t)+sc.access[m]*(w.access/t)};
const getColor = s => s>=4?"#059669":s>=3.2?"#16a34a":s>=2.5?"#a16207":s>=1.8?"#c2410c":"#dc2626";
const getBg = s => s>=4?"#dcfce7":s>=3.2?"#f0fdf4":s>=2.5?"#fef9c3":s>=1.8?"#fff7ed":"#fef2f2";
const getLabel = s => s>=4?"Excellent":s>=3.2?"Good":s>=2.5?"Fair":s>=1.8?"Poor":"Avoid";

function App() {
  const [view, setView] = useState("when");
  const [weights, setWeights] = useState({price:30,weather:25,crowds:25,access:20});
  const [preset, setPreset] = useState("balanced");
  const [catFilter, setCatFilter] = useState(null);
  const [month, setMonth] = useState(new Date().getMonth());
  const [expanded, setExpanded] = useState(null);
  const [showAbout, setShowAbout] = useState(false);

  const applyPreset = k => {const p=PRESETS[k];setWeights({price:p.price,weather:p.weather,crowds:p.crowds,access:p.access});setPreset(k)};
  const setW = (k,v) => {setWeights(p=>({...p,[k]:v}));setPreset(null)};

  const filtered = useMemo(() =>
    Object.entries(destinations).filter(([_,d]) => !catFilter || d.cat === catFilter),
    [catFilter]
  );

  const ranked = useMemo(() =>
    filtered.map(([k,d]) => ({key:k,dest:d,score:getComp(d.scores,month,weights)})).sort((a,b) => b.score-a.score),
    [month,weights,filtered]
  );

  const bestByMonth = useMemo(() =>
    MONTHS.map((_,i) => {
      let best={name:"",score:0,emoji:"",key:""};
      filtered.forEach(([k,d])=>{const s=getComp(d.scores,i,weights);if(s>best.score)best={name:d.name,score:s,emoji:d.emoji,key:k}});
      return best;
    }),
    [weights,filtered]
  );

  return (
    <div style={{maxWidth:900,margin:"0 auto",padding:"28px 20px 60px"}}>
      {/* HEADER */}
      <header className="fade-up" style={{marginBottom:24}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontFamily:"'DM Serif Display',serif",fontSize:32,fontWeight:400,color:"#1a1a1a",lineHeight:1.1}}>
              Shoulder
            </div>
            <p style={{fontSize:14,color:"#6b7280",marginTop:6,maxWidth:520,lineHeight:1.5}}>
              Find the sweet spot between peak and off-season for 23 US destinations.
              Adjust the weights to match what matters to <em>you</em>.
            </p>
          </div>
          <button onClick={()=>setShowAbout(!showAbout)} style={{
            padding:"6px 14px",borderRadius:20,fontSize:11,fontWeight:600,cursor:"pointer",
            border:"1px solid #d1d5db",background:showAbout?"#1a1a1a":"white",color:showAbout?"white":"#6b7280",
            whiteSpace:"nowrap"
          }}>
            {showAbout ? "Close ✕" : "What is this?"}
          </button>
        </div>

        {showAbout && (
          <div className="fade-up" style={{marginTop:16,background:"#fefce8",border:"1px solid #fde68a",borderRadius:10,padding:20}}>
            <div style={{fontSize:14,fontWeight:700,color:"#854d0e",marginBottom:8}}>
              You're looking at a prototype.
            </div>
            <div style={{fontSize:13,color:"#92400e",lineHeight:1.7}}>
              <strong>Shoulder</strong> is a data model that identifies the best time to visit a destination by combining four variables: price, weather, crowds, and service availability. Most travel advice gives you one person's opinion. This gives you a composite score you can adjust based on your own priorities.
              <br/><br/>
              <strong>What we're testing:</strong> Does this scoring approach feel useful? Would you trust it to plan a trip? What's missing? What would make you come back?
              <br/><br/>
              <strong>What it is now:</strong> 23 US destinations scored manually from 2024-2025 tourism data. Next step is real-time data from weather, flight, and park visitation APIs.
              <br/><br/>
              <span style={{fontSize:12,color:"#a16207"}}>Built by Monte Cristo Studio — <a href="mailto:feedback@example.com" style={{color:"#854d0e"}}>send feedback</a></span>
            </div>
          </div>
        )}
      </header>

      {/* WEIGHTS PANEL */}
      <div className="fade-up fade-d1" style={{background:"white",border:"1px solid #e5e7eb",borderRadius:12,padding:"14px 18px",marginBottom:16,boxShadow:"0 1px 2px rgba(0,0,0,.04)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <span style={{fontSize:13,fontWeight:700,color:"#374151"}}>What matters to you?</span>
          <div style={{display:"flex",gap:4}}>
            {Object.entries(PRESETS).map(([k,p])=>(
              <button key={k} onClick={()=>applyPreset(k)} title={p.desc} style={{
                padding:"4px 10px",borderRadius:14,fontSize:10,fontWeight:600,cursor:"pointer",
                border:preset===k?"1.5px solid #1a1a1a":"1px solid #e5e7eb",
                background:preset===k?"#1a1a1a":"#faf9f6",color:preset===k?"white":"#9ca3af",
                transition:"all .15s"
              }}>{p.label}</button>
            ))}
          </div>
        </div>
        {[
          {k:"price",l:"Price",i:"💰",c:"#059669"},
          {k:"weather",l:"Weather",i:"☀️",c:"#0284c7"},
          {k:"crowds",l:"Crowds",i:"👥",c:"#7c3aed"},
          {k:"access",l:"Access",i:"🔓",c:"#c2410c"},
        ].map(s=>(
          <div key={s.k} style={{display:"flex",alignItems:"center",gap:8,padding:"3px 0"}}>
            <span style={{fontSize:13,width:24,textAlign:"center"}}>{s.i}</span>
            <span style={{width:56,fontSize:11,fontWeight:600,color:"#4b5563"}}>{s.l}</span>
            <input type="range" min={5} max={60} value={weights[s.k]} onChange={e=>setW(s.k,+e.target.value)}
              style={{flex:1,accentColor:s.c}} />
            <span style={{width:32,textAlign:"center",fontSize:12,fontWeight:700,color:s.c}}>{weights[s.k]}%</span>
          </div>
        ))}
      </div>

      {/* CATEGORY FILTER + VIEW TABS */}
      <div className="fade-up fade-d2" style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          <button onClick={()=>setCatFilter(null)} style={{
            padding:"5px 12px",borderRadius:14,fontSize:11,fontWeight:600,cursor:"pointer",
            border:!catFilter?"1.5px solid #1a1a1a":"1px solid #e5e7eb",
            background:!catFilter?"#1a1a1a":"white",color:!catFilter?"white":"#9ca3af"
          }}>All 23</button>
          {Object.entries(CATEGORIES).map(([k,c])=>{
            const n=Object.values(destinations).filter(d=>d.cat===k).length;
            return(
              <button key={k} onClick={()=>setCatFilter(catFilter===k?null:k)} style={{
                padding:"5px 12px",borderRadius:14,fontSize:11,fontWeight:600,cursor:"pointer",
                border:catFilter===k?`1.5px solid ${c.color}`:"1px solid #e5e7eb",
                background:catFilter===k?c.color:"white",color:catFilter===k?"white":"#9ca3af"
              }}>{c.icon} {c.label} ({n})</button>
            )
          })}
        </div>
        <div style={{display:"flex",gap:2,background:"#f3f4f6",borderRadius:8,padding:2}}>
          {[{k:"when",l:"By Month"},{k:"detail",l:"By Place"},{k:"compare",l:"Compare"}].map(t=>(
            <button key={t.k} onClick={()=>setView(t.k)} style={{
              padding:"6px 14px",borderRadius:6,fontSize:12,fontWeight:600,cursor:"pointer",border:"none",
              background:view===t.k?"white":"transparent",color:view===t.k?"#1a1a1a":"#9ca3af",
              boxShadow:view===t.k?"0 1px 2px rgba(0,0,0,.06)":"none",transition:"all .15s"
            }}>{t.l}</button>
          ))}
        </div>
      </div>

      {/* BY MONTH VIEW */}
      {view === "when" && (
        <div>
          {/* Month selector */}
          <div className="fade-up fade-d3" style={{display:"flex",gap:4,marginBottom:16,flexWrap:"wrap"}}>
            {MONTHS.map((m,i)=>(
              <button key={m} onClick={()=>setMonth(i)} style={{
                padding:"8px 0",flex:1,minWidth:56,borderRadius:8,fontSize:12,fontWeight:i===month?700:500,cursor:"pointer",
                border:i===month?"2px solid #1a1a1a":"1px solid #e5e7eb",
                background:i===month?"#1a1a1a":"white",color:i===month?"white":"#6b7280",
                transition:"all .15s"
              }}>{m}</button>
            ))}
          </div>

          {/* Best of month banner */}
          {ranked.length > 0 && (
            <div className="fade-up fade-d4" style={{
              background:`linear-gradient(135deg, ${getColor(ranked[0].score)}08, ${getColor(ranked[0].score)}15)`,
              border:`1.5px solid ${getColor(ranked[0].score)}30`,
              borderRadius:12,padding:"16px 20px",marginBottom:14,
              display:"flex",alignItems:"center",gap:16
            }}>
              <span style={{fontSize:36}}>{ranked[0].dest.emoji}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:11,color:"#6b7280",fontWeight:600,textTransform:"uppercase",letterSpacing:1}}>
                  Best in {MONTH_FULL[month]}
                </div>
                <div style={{fontFamily:"'DM Serif Display',serif",fontSize:22,color:"#1a1a1a"}}>
                  {ranked[0].dest.name}
                </div>
                <div style={{fontSize:12,color:"#6b7280",marginTop:2}}>{ranked[0].dest.tagline}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:28,fontWeight:800,color:getColor(ranked[0].score)}}>{ranked[0].score.toFixed(1)}</div>
                <div style={{fontSize:11,color:getColor(ranked[0].score),fontWeight:600}}>{getLabel(ranked[0].score)}</div>
              </div>
            </div>
          )}

          {/* Ranked list */}
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {ranked.map((item,idx)=>(
              <div key={item.key} className={`slide-in`} style={{animationDelay:`${idx*0.03}s`,
                display:"flex",alignItems:"center",gap:12,
                background:"white",border:"1px solid #e5e7eb",borderRadius:10,padding:"10px 14px",
                cursor:"pointer",transition:"all .15s",
                ...(expanded===item.key ? {borderColor:getColor(item.score),boxShadow:`0 0 0 1px ${getColor(item.score)}20`} : {})
              }} onClick={()=>setExpanded(expanded===item.key?null:item.key)}>
                <div style={{
                  width:24,height:24,borderRadius:"50%",flexShrink:0,
                  background:idx===0?"#1a1a1a":idx<3?"#6b7280":"#d1d5db",
                  color:"white",display:"flex",alignItems:"center",justifyContent:"center",
                  fontSize:11,fontWeight:800
                }}>{idx+1}</div>
                <span style={{fontSize:20,flexShrink:0}}>{item.dest.emoji}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:14,fontWeight:700,color:"#1a1a1a"}}>{item.dest.name}</span>
                    <span style={{fontSize:10,color:CATEGORIES[item.dest.cat].color,fontWeight:600,background:CATEGORIES[item.dest.cat].color+"12",padding:"1px 6px",borderRadius:8}}>{item.dest.region}</span>
                  </div>
                  <div style={{fontSize:11,color:"#9ca3af",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{item.dest.tagline}</div>
                </div>
                {/* Mini score bars */}
                <div style={{display:"flex",gap:3,flexShrink:0}}>
                  {[{k:"price",c:"#059669"},{k:"weather",c:"#0284c7"},{k:"crowds",c:"#7c3aed"},{k:"access",c:"#c2410c"}].map(s=>(
                    <div key={s.k} style={{width:4,height:24,borderRadius:2,background:"#f3f4f6",position:"relative",overflow:"hidden"}}>
                      <div style={{position:"absolute",bottom:0,width:"100%",height:`${item.dest.scores[s.k][month]*20}%`,background:s.c,borderRadius:2,transition:"height .3s"}}/>
                    </div>
                  ))}
                </div>
                <div style={{textAlign:"right",flexShrink:0,width:50}}>
                  <div style={{fontSize:20,fontWeight:800,color:getColor(item.score)}}>{item.score.toFixed(1)}</div>
                </div>
              </div>
            ))}
          </div>
          {expanded && ranked.find(r=>r.key===expanded) && (()=>{
            const item = ranked.find(r=>r.key===expanded);
            return (
              <div className="fade-up" style={{marginTop:8,background:"white",border:`1.5px solid ${getColor(item.score)}30`,borderRadius:12,padding:18}}>
                <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:14,marginBottom:10}}>
                  <div style={{fontSize:13,fontWeight:700,color:"#166534",marginBottom:4}}>✦ Best Window: {item.dest.best}</div>
                  <div style={{fontSize:12,color:"#15803d",lineHeight:1.6}}>{item.dest.why}</div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  <div style={{background:"#fefce8",border:"1px solid #fde68a",borderRadius:8,padding:12}}>
                    <div style={{fontSize:10,fontWeight:700,color:"#854d0e",marginBottom:3}}>⚠ The Tradeoff</div>
                    <div style={{fontSize:12,color:"#92400e",lineHeight:1.5}}>{item.dest.tradeoff}</div>
                  </div>
                  <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8,padding:12}}>
                    <div style={{fontSize:10,fontWeight:700,color:"#1e40af",marginBottom:3}}>💡 Pro Tip</div>
                    <div style={{fontSize:12,color:"#1e3a5f",lineHeight:1.5}}>{item.dest.tip}</div>
                  </div>
                </div>
              </div>
            );
          })()}
        </div>
      )}

      {/* BY PLACE VIEW */}
      {view === "detail" && (
        <div>
          {Object.entries(CATEGORIES).filter(([k])=>!catFilter||k===catFilter).map(([catKey,cat])=>{
            const dests = filtered.filter(([_,d])=>d.cat===catKey);
            if(dests.length===0) return null;
            return (
              <div key={catKey} style={{marginBottom:20}}>
                <div className="fade-up" style={{fontSize:13,fontWeight:700,color:cat.color,marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
                  <span>{cat.icon}</span>{cat.label}
                </div>
                {dests.map(([key,dest],idx)=>{
                  const composites = MONTHS.map((_,i)=>getComp(dest.scores,i,weights));
                  const bestScore = Math.max(...composites);
                  const bestIdx = composites.indexOf(bestScore);
                  const isOpen = expanded === key;
                  return (
                    <div key={key} className="fade-up" style={{animationDelay:`${idx*0.05}s`,
                      background:"white",border:"1px solid #e5e7eb",borderRadius:10,padding:14,marginBottom:8,
                      ...(isOpen?{borderColor:cat.color+"60"}:{})
                    }}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,cursor:"pointer"}} onClick={()=>setExpanded(isOpen?null:key)}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{fontSize:20}}>{dest.emoji}</span>
                          <div>
                            <div style={{fontSize:15,fontWeight:700,color:"#1a1a1a"}}>{dest.name} <span style={{fontSize:11,fontWeight:400,color:"#9ca3af"}}>{dest.region}</span></div>
                            <div style={{fontSize:11,color:"#9ca3af",fontStyle:"italic"}}>{dest.tagline}</div>
                          </div>
                        </div>
                        <div style={{textAlign:"right",fontSize:10,color:"#9ca3af"}}>
                          <div>Best: <strong style={{color:getColor(bestScore)}}>{MONTHS[bestIdx]} ({bestScore.toFixed(1)})</strong></div>
                          <span style={{cursor:"pointer",color:cat.color,fontWeight:600}}>{isOpen?"▴ Less":"▾ More"}</span>
                        </div>
                      </div>
                      {/* Month grid */}
                      <div style={{display:"grid",gridTemplateColumns:"repeat(12,1fr)",gap:3}}>
                        {MONTHS.map((m,i)=>{
                          const s=composites[i];const isBest=i===bestIdx;
                          return(
                            <div key={m} style={{textAlign:"center",padding:"7px 1px 5px",borderRadius:6,
                              background:isBest?getColor(s):getBg(s),border:isBest?"none":"1px solid #f3f4f6"}}>
                              <div style={{fontSize:8,color:isBest?"rgba(255,255,255,.7)":"#9ca3af"}}>{m}</div>
                              <div style={{fontSize:14,fontWeight:800,color:isBest?"white":getColor(s)}}>{s.toFixed(1)}</div>
                            </div>
                          )
                        })}
                      </div>
                      {isOpen && (
                        <div className="fade-up" style={{marginTop:12}}>
                          <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:12,marginBottom:8}}>
                            <div style={{fontSize:12,fontWeight:700,color:"#166534",marginBottom:3}}>✦ Best Window: {dest.best}</div>
                            <div style={{fontSize:12,color:"#15803d",lineHeight:1.5}}>{dest.why}</div>
                          </div>
                          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                            <div style={{background:"#fefce8",border:"1px solid #fde68a",borderRadius:8,padding:10}}>
                              <div style={{fontSize:10,fontWeight:700,color:"#854d0e",marginBottom:2}}>⚠ Tradeoff</div>
                              <div style={{fontSize:11,color:"#92400e",lineHeight:1.4}}>{dest.tradeoff}</div>
                            </div>
                            <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8,padding:10}}>
                              <div style={{fontSize:10,fontWeight:700,color:"#1e40af",marginBottom:2}}>💡 Pro Tip</div>
                              <div style={{fontSize:11,color:"#1e3a5f",lineHeight:1.4}}>{dest.tip}</div>
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      )}

      {/* COMPARE VIEW */}
      {view === "compare" && (
        <div className="fade-up fade-d3">
          {/* Best by month row */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:6,marginBottom:20}}>
            {MONTHS.map((m,i)=>(
              <div key={m} style={{background:getBg(bestByMonth[i].score),borderRadius:8,padding:"8px 6px",
                border:bestByMonth[i].score>=3.5?`1.5px solid ${getColor(bestByMonth[i].score)}40`:"1px solid #e5e7eb",
                textAlign:"center"}}>
                <div style={{fontSize:9,color:"#9ca3af"}}>{MONTH_FULL[i]}</div>
                <div style={{fontSize:18,margin:"2px 0"}}>{bestByMonth[i].emoji}</div>
                <div style={{fontSize:10,fontWeight:700,color:"#1a1a1a",lineHeight:1.1}}>{bestByMonth[i].name}</div>
                <div style={{fontSize:13,fontWeight:800,color:getColor(bestByMonth[i].score),marginTop:1}}>{bestByMonth[i].score.toFixed(1)}</div>
              </div>
            ))}
          </div>

          {/* Heat map table */}
          <div style={{overflowX:"auto",borderRadius:10,border:"1px solid #e5e7eb"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,background:"white"}}>
              <thead>
                <tr style={{background:"#faf9f6"}}>
                  <th style={{textAlign:"left",padding:"10px 12px",borderBottom:"1px solid #e5e7eb",color:"#374151",fontSize:11,position:"sticky",left:0,background:"#faf9f6",zIndex:1}}>Destination</th>
                  {MONTHS.map(m=><th key={m} style={{padding:"10px 3px",borderBottom:"1px solid #e5e7eb",color:"#9ca3af",fontSize:10,textAlign:"center"}}>{m}</th>)}
                </tr>
              </thead>
              <tbody>
                {filtered.map(([key,dest],rowIdx)=>{
                  const scores = MONTHS.map((_,i)=>getComp(dest.scores,i,weights));
                  const maxS = Math.max(...scores);
                  return(
                    <tr key={key} style={{background:rowIdx%2===0?"white":"#faf9f6"}}>
                      <td style={{padding:"7px 12px",borderBottom:"1px solid #f3f4f6",whiteSpace:"nowrap",position:"sticky",left:0,background:rowIdx%2===0?"white":"#faf9f6",zIndex:1}}>
                        <span style={{marginRight:4}}>{dest.emoji}</span>
                        <span style={{fontWeight:600,color:"#1a1a1a",fontSize:11}}>{dest.name}</span>
                      </td>
                      {scores.map((s,i)=>(
                        <td key={i} style={{padding:"3px 2px",borderBottom:"1px solid #f3f4f6",textAlign:"center"}}>
                          <div style={{
                            background:s===maxS?getColor(s):getBg(s),
                            color:s===maxS?"white":getColor(s),
                            fontWeight:700,fontSize:11,borderRadius:3,padding:"4px 1px"
                          }}>{s.toFixed(1)}</div>
                        </td>
                      ))}
                    </tr>
                  )
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* FOOTER */}
      <footer className="fade-up" style={{marginTop:32,textAlign:"center"}}>
        <div style={{fontSize:11,color:"#9ca3af",lineHeight:1.6}}>
          <strong>Shoulder v0.3</strong> — 23 destinations scored from 2024-2025 tourism data
          <br/>Next: real-time weather, flight pricing, and NPS visitor APIs
          <br/><span style={{color:"#c2410c"}}>Monte Cristo Studio</span> — Building tools for smarter travel
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
